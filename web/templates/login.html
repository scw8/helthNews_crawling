<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 건강 스크립트 생성기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #1e2333;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
    }

    p {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 11px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input[type="password"]:focus {
      border-color: #4f6ef7;
    }

    .error-msg {
      background: #3b1c1c;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #fca5a5;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f6ef7;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3b5bdb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>건강 스크립트 생성기</h1>
    <p>비밀번호를 입력해주세요.</p>

    {% if error %}
    <div class="error-msg">비밀번호가 올바르지 않습니다.</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" />
      <button type="submit">입력</button>
    </form>
  </div>
</body>
</html>
