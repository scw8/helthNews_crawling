quality:
  min_score: 0.3                # 이 점수 미만은 저장하지 않음
  priority_score: 0.7           # 스크립트 생성 시 우선 사용

generate:
  max_articles_per_topic: 15    # 스크립트 생성 시 참고할 최대 기사 수
  default_days: 60              # 기본적으로 최근 60일치 기사 사용
  output_dir: "output/scripts"
