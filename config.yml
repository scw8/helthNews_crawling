crawl:
  request_delay_seconds: 2      # 서버 부하 방지 요청 간격
  timeout_seconds: 15
  max_retries: 3
  days_to_keep: 90              # DB에 90일치 기사 보관

sources:
  rss:
    - name: kdca
      url: "https://www.kdca.go.kr/bbs/kdca/41/rssList.do?row=50"
      enabled: true
    - name: health_chosun
      url: "https://health.chosun.com/site/data/rss/rss.xml"
      enabled: true
    - name: mdtoday
      url: "https://www.mdtoday.co.kr/news/rss.php"
      enabled: true
    - name: kormedi
      url: "https://kormedi.com/feed/"
      enabled: true
    - name: who
      url: "https://www.who.int/rss-feeds/news-english.xml"
      enabled: true
    - name: sciencedaily
      url: "https://www.sciencedaily.com/rss/health_medicine.xml"
      enabled: true

  html:
    - name: nhis
      list_url: "https://www.nhis.or.kr/nhis/together/wbhaec07100m01.do"
      enabled: true
    - name: snuh
      list_url: "https://www.snuh.org/health/nMedInfo/nList.do"
      enabled: true

  api:
    - name: pubmed
      search_terms:
        - "diabetes mellitus elderly Korean"
        - "hypertension elderly management Korean"
        - "dementia prevention lifestyle elderly"
        - "osteoarthritis elderly treatment"
        - "vitamin D deficiency elderly Korean"
        - "cholesterol management elderly"
        - "periodontal disease elderly"
        - "insomnia elderly treatment"
        - "headache elderly management"
        - "skin aging elderly collagen"
      max_results_per_query: 10
      enabled: true

